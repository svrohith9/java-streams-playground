name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # JDK 21 (LTS) builds everything except the JDK 25-only gatherer tests
        # (excluded automatically by the Maven profile). JDK 25 builds and runs
        # the gatherer tests as well.
        java: [ '21', '25' ]

    name: build (JDK ${{ matrix.java }})
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B test
