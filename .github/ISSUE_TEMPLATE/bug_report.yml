name: 🐛 Bug report
description: A wrong expected value, a typo, a broken link, or a test that won't compile.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make the playground better! Please fill in the details below.
  - type: input
    id: location
    attributes:
      label: Where is it?
      description: File path and/or exercise name.
      placeholder: src/test/java/.../a_easy_problems/numbers/A_CountEvenNumbers.java
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What's wrong?
      description: What did you expect, and what did you find instead?
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: JDK version
      placeholder: "21 (Temurin)"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Stack traces, screenshots, or context.
    validations:
      required: false
